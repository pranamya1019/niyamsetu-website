<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NiyamSetu · Compliance Chronicle</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0e14;
      color: #c9d1e0;
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 100;
    }

    /* Header */
    #header {
      border-bottom: 1px solid #1e2330;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0b0c12;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    #header-left { display: flex; align-items: center; gap: 14px; }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
      flex-shrink: 0;
    }
    #status-dot.loading { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; animation: pulse 0.8s infinite; }

    #header-title { font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #e8f0fe; text-transform: uppercase; }
    #header-sub { font-size: 10px; color: #556070; letter-spacing: 1px; }

    #header-right { display: flex; align-items: center; gap: 16px; }

    #new-badge {
      display: none;
      background: #00ff8818; border: 1px solid #00ff8840;
      color: #00ff88; border-radius: 4px; padding: 3px 10px;
      font-size: 11px; letter-spacing: 1px;
    }
    #high-badge {
      display: none;
      background: #ff444418; border: 1px solid #ff444440;
      color: #ff6b6b; border-radius: 4px; padding: 3px 10px;
      font-size: 11px; letter-spacing: 1px;
    }

    #countdown-box { font-size: 11px; color: #444e60; text-align: right; }
    #countdown-val { color: #ffaa00; font-size: 13px; font-weight: 700; }

    #refresh-btn {
      background: transparent; border: 1px solid #2a3040;
      color: #7888a0; border-radius: 4px; padding: 6px 14px;
      font-size: 11px; cursor: pointer; letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.2s;
    }
    #refresh-btn:hover { border-color: #00ff8840; color: #00ff88; }
    #refresh-btn:disabled { opacity: 0.4; cursor: wait; }

    /* Back link */
    #back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; color: #445060; text-decoration: none;
      letter-spacing: 1px; padding: 8px 24px;
      border-bottom: 1px solid #1a1f2b;
      transition: color 0.2s;
    }
    #back-link:hover { color: #7888a0; }

    /* Layout */
    #layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      height: calc(100vh - 100px);
    }

    /* Main feed */
    #main-feed { overflow-y: auto; padding: 20px 24px; }

    /* Filter bar */
    #filter-bar {
      display: flex; gap: 8px; margin-bottom: 18px;
      align-items: center; flex-wrap: wrap;
    }
    #filter-label { font-size: 10px; color: #445060; letter-spacing: 1px; margin-right: 4px; }
    .filter-btn {
      background: transparent; border: 1px solid #1e2330;
      color: #556070; border-radius: 4px; padding: 4px 12px;
      font-size: 10px; cursor: pointer; letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace; transition: all 0.15s;
    }
    .filter-btn.active { background: #ffffff12; border-color: #ffffff28; color: #c9d1e0; }
    #article-count { margin-left: auto; font-size: 10px; color: #334050; }

    /* Articles */
    .article-card {
      border: 1px solid #1a1f2b;
      border-left: 3px solid #1a1f2b;
      border-radius: 4px;
      margin-bottom: 4px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s;
      animation: slideIn 0.25s ease both;
    }
    .article-card:hover { background: #ffffff04; }
    .article-card.high { border-color: #ff6b6b30; border-left-color: #ff6b6b; }
    .article-card.high:hover { background: #ff6b6b08; }
    .article-card.medium { border-color: #ffaa0020; border-left-color: #ffaa00; }
    .article-card.medium:hover { background: #ffaa0008; }
    .article-card.is-new { background: #00ff880a; }

    .card-top { display: flex; align-items: flex-start; gap: 10px; }

    .score-badge {
      border-radius: 4px; padding: 2px 7px;
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      min-width: 32px; text-align: center; flex-shrink: 0;
    }
    .score-high { background: #00ff8818; border: 1px solid #00ff8840; color: #00ff88; }
    .score-med  { background: #ffaa0018; border: 1px solid #ffaa0040; color: #ffaa00; }
    .score-low  { background: #ffffff08; border: 1px solid #55556b40; color: #555a6b; }

    .card-body { flex: 1; min-width: 0; }

    .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }

    .tag-source {
      font-size: 9px; letter-spacing: 1px; color: #445060;
      background: #ffffff08; border: 1px solid #1e2330;
      border-radius: 2px; padding: 1px 5px; flex-shrink: 0;
    }
    .tag-new {
      font-size: 9px; letter-spacing: 1px; color: #00ff88;
      background: #00ff8818; border: 1px solid #00ff8830;
      border-radius: 2px; padding: 1px 5px; flex-shrink: 0;
    }
    .tag-ai { font-size: 9px; color: #4455aa; flex-shrink: 0; }
    .card-time { font-size: 9px; color: #334050; margin-left: auto; flex-shrink: 0; }

    .card-title {
      font-size: 12px; line-height: 1.5; color: #7888a0;
      margin-bottom: 4px;
    }
    .card-title.high { color: #e8f0fe; font-weight: 600; }
    .card-title.medium { color: #c9d1e0; }

    .card-ai-summary { font-size: 10px; color: #5566aa; margin-bottom: 4px; font-style: italic; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .compliance-tag {
      background: #ffffff0a; border: 1px solid #ffffff18;
      color: #8892a4; border-radius: 3px; padding: 1px 7px;
      font-size: 10px; letter-spacing: 0.5px;
    }

    .card-expand {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #1a1f2b;
      font-size: 10px; color: #556070; line-height: 1.7;
      display: none;
    }
    .card-expand.open { display: block; }
    .card-expand p { margin-bottom: 8px; }
    .read-more {
      color: #4477cc; font-size: 10px; text-decoration: none;
      letter-spacing: 1px; border-bottom: 1px solid #4477cc40;
    }

    /* Loading spinner */
    #loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 300px; gap: 16px; color: #445060;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #1e2330;
      border-top: 2px solid #00ff88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loader-text { font-size: 11px; letter-spacing: 2px; }

    /* Sidebar */
    #sidebar {
      border-left: 1px solid #1a1f2b;
      overflow-y: auto;
      background: #0b0c12;
      display: flex;
      flex-direction: column;
    }

    .sidebar-section { padding: 16px; border-bottom: 1px solid #1a1f2b; }
    .sidebar-title { font-size: 10px; letter-spacing: 2px; color: #445060; margin-bottom: 10px; }

    .feed-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; border-bottom: 1px solid #12151e;
    }
    .feed-dot { width: 5px; height: 5px; border-radius: 50%; background: #334050; flex-shrink: 0; }
    .feed-dot.ok { background: #00ff88; }
    .feed-dot.err { background: #ff4444; }
    .feed-name { font-size: 10px; color: #556070; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .feed-count { font-size: 10px; color: #334050; }

    .stat-row {
      display: flex; justify-content: space-between;
      padding: 5px 0; border-bottom: 1px solid #12151e;
    }
    .stat-label { font-size: 10px; color: #445060; }
    .stat-val { font-size: 12px; font-weight: 700; }

    #log-section { padding: 16px; flex: 1; overflow-y: auto; }
    .log-entry {
      font-size: 9px; color: #334050;
      line-height: 1.8; border-bottom: 1px solid #12151e;
      padding: 2px 0; word-break: break-word;
    }
    .log-entry.latest { color: #7888a0; }

    #last-refresh-bar {
      padding: 10px 16px; font-size: 9px; color: #334050;
      border-top: 1px solid #1a1f2b; letter-spacing: 1px;
    }

    /* Animations */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0b0c12; }
    ::-webkit-scrollbar-thumb { background: #1e2330; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div id="status-dot"></div>
      <div>
        <div id="header-title">NiyamSetu · Compliance Chronicle</div>
        <div id="header-sub">LIVE FEED MONITOR · 5 SOURCES</div>
      </div>
    </div>
    <div id="header-right">
      <div id="new-badge">↑ <span id="new-count">0</span> NEW</div>
      <div id="high-badge">⚠ <span id="high-count">0</span> HIGH PRIORITY</div>
      <div id="countdown-box">
        NEXT REFRESH<br>
        <span id="countdown-val">5:00</span>
      </div>
      <button id="refresh-btn" onclick="startRefresh()">↻ REFRESH</button>
    </div>
  </div>

  <a href="index.html" id="back-link">← Back to NiyamSetu</a>

  <!-- Layout -->
  <div id="layout">

    <!-- Main Feed -->
    <div id="main-feed">
      <div id="filter-bar">
        <span id="filter-label">FILTER:</span>
        <button class="filter-btn active" onclick="setFilter('all', this)">ALL ARTICLES</button>
        <button class="filter-btn" onclick="setFilter('high', this)">HIGH (≥7)</button>
        <button class="filter-btn" onclick="setFilter('medium', this)">MEDIUM (≥4)</button>
        <span id="article-count">— ARTICLES</span>
      </div>
      <div id="articles-container">
        <div id="loader">
          <div class="spinner"></div>
          <div id="loader-text">FETCHING NEWS FEEDS…</div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">FEED STATUS</div>
        <div id="feed-status-list"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">SUMMARY</div>
        <div id="stats-list"></div>
      </div>
      <div id="log-section">
        <div class="sidebar-title">ACTIVITY LOG</div>
        <div id="activity-log"></div>
      </div>
      <div id="last-refresh-bar">LAST REFRESH: —</div>
    </div>

  </div>

  <script>
    const FEEDS = [
      { name: "ET Policy",       tag: "ET",   url: "https://economictimes.indiatimes.com/news/economy/policy/rssfeeds/1052732854.cms" },
      { name: "ET Finance",      tag: "ET",   url: "https://economictimes.indiatimes.com/news/economy/finance/rssfeeds/44748076.cms" },
      { name: "Business Std",    tag: "BS",   url: "https://www.business-standard.com/rss/latest.rss" },
      { name: "LiveMint Economy",tag: "MINT", url: "https://www.livemint.com/rss/economy" },
      { name: "Financial Express",tag: "FE",  url: "https://www.financialexpress.com/feed/" },
    ];

    const COMPLIANCE_KW = [
      "SEBI","RBI","MCA","IRDAI","GSTN","GST","income tax","FEMA","PMLA",
      "NCLT","NCLAT","Companies Act","MSME","compliance","regulatory","enforcement",
      "penalty","circular","notification","amendment","gazette","tribunal",
      "CCI","DPIIT","ROC","EPFO","ESI","labour","tax","audit","disclosure",
      "insolvency","IBC","NPA","fraud","banking","finance","policy",
    ];

    const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";
    const REFRESH_MS = 5 * 60 * 1000;

    let allArticles = [];
    let knownIds = new Set();
    let currentFilter = "all";
    let refreshTimer, countdownTimer, countdownSec = 300;
    let classifying = false;

    // ── Utilities ──────────────────────────────────────────────
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return "just now";
      if (m < 60) return m + "m ago";
      const h = Math.floor(m / 60);
      if (h < 24) return h + "h ago";
      return Math.floor(h / 24) + "d ago";
    }

    function quickScore(title, desc) {
      const text = (title + " " + desc).toLowerCase();
      let score = 0; const matched = [];
      for (const kw of COMPLIANCE_KW) {
        if (text.includes(kw.toLowerCase())) { score++; matched.push(kw); }
      }
      return { score: Math.min(score * 2, 10), tags: matched.slice(0, 4) };
    }

    function addLog(msg) {
      const log = document.getElementById("activity-log");
      const entry = document.createElement("div");
      entry.className = "log-entry latest";
      entry.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
      // Remove 'latest' from old entries
      log.querySelectorAll(".log-entry.latest").forEach(e => e.classList.remove("latest"));
      log.prepend(entry);
      // Keep max 30
      while (log.children.length > 30) log.removeChild(log.lastChild);
    }

    // ── Fetch feeds ───────────────────────────────────────────
    async function fetchFeed(feed) {
      const res = await fetch(RSS2JSON + encodeURIComponent(feed.url));
      const data = await res.json();
      if (data.status !== "ok") return [];
      return (data.items || []).slice(0, 8).map(item => ({
        id: item.link,
        title: item.title || "",
        description: (item.description || "").replace(/<[^>]+>/g, "").slice(0, 200),
        link: item.link,
        pubDate: item.pubDate,
        source: feed.name,
        tag: feed.tag,
        isNew: false,
        score: 0,
        tags: [],
        aiSummary: "",
        classified: false,
      }));
    }

    // ── Claude AI classify ─────────────────────────────────────
    async function classifyWithClaude(articles) {
      const prompt = `You are a compliance analyst for Indian businesses.
Classify each news article below. For each, return JSON with:
- id (exact id string)
- score: 0-10 (10 = highly compliance-relevant for Indian businesses)
- tags: array of compliance domains (e.g. "GST", "SEBI", "RBI", "Labour", "Corporate", "Tax", "FEMA", "Banking")
- summary: 1-line compliance insight (max 80 chars)

Articles:
${articles.map(a => `ID: ${a.id}\nTitle: ${a.title}\nDesc: ${a.description}`).join("\n---\n")}

Respond ONLY with a JSON array, no markdown, no explanation.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      const data = await response.json();
      const text = (data.content?.[0]?.text || "[]").replace(/```json|```/g, "").trim();
      try { return JSON.parse(text); } catch { return []; }
    }

    // ── Render ─────────────────────────────────────────────────
    function renderArticles() {
      const container = document.getElementById("articles-container");
      const filtered = allArticles.filter(a => {
        if (currentFilter === "high") return a.score >= 7;
        if (currentFilter === "medium") return a.score >= 4;
        return true;
      });

      document.getElementById("article-count").textContent =
        filtered.length + " ARTICLES · " + (classifying ? "🔍 CLASSIFYING…" : "IDLE");

      if (filtered.length === 0) {
        container.innerHTML = '<div style="color:#445060;font-size:12px;text-align:center;padding:40px">No articles match this filter.</div>';
        return;
      }

      container.innerHTML = filtered.map((a, i) => {
        const isHigh = a.score >= 7, isMed = a.score >= 4 && a.score < 7;
        const scoreClass = isHigh ? "score-high" : isMed ? "score-med" : "score-low";
        const cardClass = isHigh ? "high" : isMed ? "medium" : "";
        const titleClass = isHigh ? "high" : isMed ? "medium" : "";

        return `
          <div class="article-card ${cardClass} ${a.isNew ? 'is-new' : ''}"
               style="animation-delay:${i * 0.02}s"
               onclick="toggleCard(this)">
            <div class="card-top">
              <span class="score-badge ${scoreClass}">${a.score.toFixed(0)}</span>
              <div class="card-body">
                <div class="card-meta">
                  <span class="tag-source">${a.tag}</span>
                  ${a.isNew ? '<span class="tag-new">NEW</span>' : ''}
                  ${a.classified ? '<span class="tag-ai">✦ AI</span>' : ''}
                  <span class="card-time">${timeAgo(a.pubDate)}</span>
                </div>
                <div class="card-title ${titleClass}">${a.title}</div>
                ${a.aiSummary ? `<div class="card-ai-summary">↳ ${a.aiSummary}</div>` : ''}
                <div class="card-tags">
                  ${a.tags.map(t => `<span class="compliance-tag">${t}</span>`).join('')}
                </div>
              </div>
            </div>
            <div class="card-expand">
              <p>${a.description}</p>
              <a href="${a.link}" target="_blank" rel="noreferrer" class="read-more">READ FULL ARTICLE ↗</a>
            </div>
          </div>`;
      }).join('');
    }

    function toggleCard(card) {
      const expand = card.querySelector(".card-expand");
      expand.classList.toggle("open");
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderArticles();
    }

    function updateStats() {
      const high = allArticles.filter(a => a.score >= 7).length;
      const med  = allArticles.filter(a => a.score >= 4 && a.score < 7).length;
      const ai   = allArticles.filter(a => a.classified).length;
      const newC = allArticles.filter(a => a.isNew).length;

      document.getElementById("stats-list").innerHTML = [
        { label: "Total Articles",  val: allArticles.length, color: "#c9d1e0" },
        { label: "High Priority",   val: high, color: "#ff6b6b" },
        { label: "Medium Priority", val: med,  color: "#ffaa00" },
        { label: "AI Classified",   val: ai,   color: "#00ff88" },
        { label: "New Since Last",  val: newC, color: "#6bb5ff" },
      ].map(s => `
        <div class="stat-row">
          <span class="stat-label">${s.label}</span>
          <span class="stat-val" style="color:${s.color}">${s.val}</span>
        </div>`).join('');

      const highCount = document.getElementById("high-count");
      const highBadge = document.getElementById("high-badge");
      highCount.textContent = high;
      highBadge.style.display = high > 0 ? "block" : "none";
    }

    function updateFeedStatus(statusMap) {
      document.getElementById("feed-status-list").innerHTML = FEEDS.map(f => {
        const s = statusMap[f.name];
        const cls = s ? (s.ok ? "ok" : "err") : "";
        return `<div class="feed-row">
          <div class="feed-dot ${cls}"></div>
          <span class="feed-name">${f.name}</span>
          <span class="feed-count">${s ? s.count : "—"}</span>
        </div>`;
      }).join('');
    }

    // ── Main refresh ───────────────────────────────────────────
    async function startRefresh() {
      const btn = document.getElementById("refresh-btn");
      const dot = document.getElementById("status-dot");
      btn.disabled = true;
      dot.classList.add("loading");
      addLog("Fetching feeds from news portals…");

      const statusMap = {};
      const fetched = [];

      await Promise.allSettled(FEEDS.map(async feed => {
        try {
          const items = await fetchFeed(feed);
          statusMap[feed.name] = { ok: true, count: items.length };
          addLog("✓ " + feed.tag + ": " + items.length + " articles");
          fetched.push(...items);
        } catch {
          statusMap[feed.name] = { ok: false, count: 0 };
          addLog("✗ Failed: " + feed.name);
        }
      }));

      updateFeedStatus(statusMap);

      // Deduplicate
      const seen = new Set();
      const deduped = fetched.filter(a => {
        if (seen.has(a.id)) return false;
        seen.add(a.id); return true;
      });

      // Mark new, quick score
      let newCount = 0;
      allArticles = deduped.map(a => {
        const isNew = !knownIds.has(a.id);
        if (isNew) { knownIds.add(a.id); newCount++; }
        const { score, tags } = quickScore(a.title, a.description);
        return { ...a, isNew, score, tags };
      }).sort((a, b) => b.score - a.score);

      // Show new badge
      const newBadge = document.getElementById("new-badge");
      document.getElementById("new-count").textContent = newCount;
      newBadge.style.display = newCount > 0 ? "block" : "none";

      btn.disabled = false;
      dot.classList.remove("loading");
      renderArticles();
      updateStats();
      addLog(deduped.length + " articles | " + newCount + " new | classifying with AI…");
      document.getElementById("last-refresh-bar").textContent =
        "LAST REFRESH: " + new Date().toLocaleTimeString();

      // Reset countdown
      countdownSec = REFRESH_MS / 1000;

      // AI classify top relevant articles
      const relevant = allArticles.filter(a => a.score >= 2).slice(0, 15);
      if (relevant.length > 0) {
        classifying = true;
        renderArticles();
        try {
          const results = await classifyWithClaude(relevant);
          const map = {};
          results.forEach(r => { if (r.id) map[r.id] = r; });

          allArticles = allArticles.map(a => {
            if (map[a.id]) {
              return {
                ...a,
                score: map[a.id].score ?? a.score,
                tags: map[a.id].tags || a.tags,
                aiSummary: map[a.id].summary || "",
                classified: true,
              };
            }
            return a;
          }).sort((a, b) => b.score - a.score);

          addLog("Claude classified " + results.length + " articles ✓");
        } catch (e) {
          addLog("AI classification failed, using keyword scores");
        }
        classifying = false;
        renderArticles();
        updateStats();
      }
    }

    // ── Countdown ──────────────────────────────────────────────
    function startCountdown() {
      countdownTimer = setInterval(() => {
        countdownSec = Math.max(0, countdownSec - 1);
        const m = Math.floor(countdownSec / 60);
        const s = String(countdownSec % 60).padStart(2, "0");
        document.getElementById("countdown-val").textContent = m + ":" + s;
      }, 1000);
    }

    // ── Init ───────────────────────────────────────────────────
    startRefresh();
    startCountdown();
    refreshTimer = setInterval(startRefresh, REFRESH_MS);
  </script>
</body>
</html>
